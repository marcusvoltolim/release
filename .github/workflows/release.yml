name: release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get Next Version (SemVer)
        id: version
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: develop
          noVersionBumpBehavior: patch

      - name: Create Release Branch
        if: ${{ steps.version.outputs.next != '' }}
        env:
          VERSION: ${{ steps.version.outputs.next }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Cria a branch e faz o commit vazio de forma simples
          git checkout -b release/$VERSION
          git commit -am "release: v${VERSION}" --allow-empty
          git push origin release/$VERSION

      - name: Create Release and Open PR via CLI
        if: ${{ steps.version.outputs.next != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.next }}
        run: |
          # Cria a release apontando para a branch que acabamos de subir
          gh release create $VERSION --target release/$VERSION --title "$VERSION" --generate-notes
          
          # Abre o PR para a main
          gh pr create --base main --head release/$VERSION --title "release: merge $VERSION" --body "PR automático da versão $VERSION" --label "release"
