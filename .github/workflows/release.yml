name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Essencial para que o semver-action consiga ler as tags anteriores

      - name: Get Next Version (SemVer)
        id: version
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: develop
          noVersionBumpBehavior: patch

      - name: Create Release and Tag
        uses: ncipollo/release-action@v1
        if: ${{ steps.version.outputs.next != '' }}
        with:
          tag: ${{ steps.version.outputs.next }}
          token: ${{ github.token }}

      - name: Create Pull Request to Main
        uses: peter-evans/create-pull-request@v8
        if: ${{ steps.version.outputs.next != '' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # 🚨 O PULO DO GATO: criamos uma branch temporária de sincronização
          branch: sync/release-${{ steps.version.outputs.next }}
          # 🚨 OBRIGATÓRIO: Força o Peter Evans a usar a base de código da develop
          # para comparar tudo o que ela tem de diferente contra a main!
          branch-suffix: short-commit-hash
          base: main
          title: "release: merge v${{ steps.version.outputs.next }} into main"
          body: |
            ## 🚀 Nova Versão Publicada via Painel!
            
            Este é um Pull Request automático para levar o código da release gerada na `develop` direto para a `main`.
            
            - **Bump Mode:** `${{ steps.version.outputs.bump }}`
            - **Versão Anterior:** `${{ steps.version.outputs.current }}`
            - **Versão Gerada:** `${{ steps.version.outputs.next }}`
            - **Origem:** `develop`
            - **Destino:** `main`
            
            A tag já foi criada e as notas de versão estão publicadas na aba de Releases do GitHub.
          labels: |
            release
            automated-pr
