name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: version
        id: version
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: develop

      - name: release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ steps.version.outputs.next }}
          makeLatest: true
          body: Changelog Contents
          token: ${{ github.token }}
