name: 🚀 Manual Release & PR to Main

on:
  workflow_dispatch: # Permite o disparo manual pelo botão no GitHub

permissions:
  contents: write
  pull-requests: write

jobs:
  release-and-pr:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout do código na branch develop (onde o workflow é disparado)
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Baixa todo o histórico para o cálculo do SemVer

      # 2. Executa o Semantic Release para gerar a Tag e a Release baseada nos Commits
      - name: Run Semantic Release (Create Tag & Release)
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          branch: develop # Força a análise na branch develop
          # Plugins integrados mais atualizados para gerar as notas de versão
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Abre o Pull Request de sincronização para a branch main
      # Este passo só roda se o Semantic Release realmente gerou uma nova versão
      - name: Create Pull Request to Main
        if: steps.semantic.outputs.new_release_published
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/release-v${{ steps.semantic.outputs.new_release_version }}
          base: main
          title: "chore(release): merge v${{ steps.semantic.outputs.new_release_version }} into main"
          body: |
            ## 🚀 Nova Versão Publicada via Painel!
            
            Este é um Pull Request automático gerado pelo disparo manual da pipeline.
            
            - **Versão Gerada:** `v${{ steps.semantic.outputs.new_release_version }}`
            - **Origem:** `develop`
            - **Destino:** `main`
            
            O histórico de alterações (`CHANGELOG`) e a tag correspondente já foram publicados na aba de Releases do GitHub.
          labels: |
            release
            automated-pr
